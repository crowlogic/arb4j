[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "roughprix"
version = "0.0.1"
description = "European option pricing for the rough Heston model with H-expansion"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    { name = "Paul P. Hager", email = "hagerpa@gmail.com" },
]
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "scipy",
    "jax",
    "jaxlib",
    "numba",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Intended Audience :: Science/Research",
]

[project.urls]
Homepage = "https://github.com/hagerpa/roughprix"
Repository = "https://github.com/hagerpa/roughprix"

[tool.setuptools.packages.find]
where = ["src"]
